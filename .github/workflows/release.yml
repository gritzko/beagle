name: Release

on:
  push:
    tags: ['v*']

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y install ninja-build libsodium-dev \
          libcurl4-gnutls-dev librocksdb-dev liblz4-dev
    - name: Configure
      run: >
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_C_COMPILER=clang -GNinja
    - name: Build
      run: ninja -C build be-cli spot-cli
    - name: Strip
      run: strip build/bin/be build/bin/spot
    - name: Package
      run: tar czf beagle-linux-x86_64.tar.gz -C build/bin be spot
    - uses: actions/upload-artifact@v4
      with:
        name: beagle-linux-x86_64
        path: beagle-linux-x86_64.tar.gz

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Install dependencies
      run: brew install ninja libsodium lz4
    - name: Configure
      run: >
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        -DWITH_ROCKS=OFF -GNinja
    - name: Build
      run: ninja -C build spot-cli
    - name: Strip
      run: strip build/bin/spot
    - name: Package
      run: tar czf beagle-macos-arm64.tar.gz -C build/bin spot
    - uses: actions/upload-artifact@v4
      with:
        name: beagle-macos-arm64
        path: beagle-macos-arm64.tar.gz

  release:
    needs: [linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Source tarball
      run: git archive --format=tar.gz --prefix=beagle/ HEAD > beagle-src.tar.gz
    - uses: actions/download-artifact@v4
    - uses: softprops/action-gh-release@v2
      with:
        files: |
          beagle-src.tar.gz
          beagle-linux-x86_64/beagle-linux-x86_64.tar.gz
          beagle-macos-arm64/beagle-macos-arm64.tar.gz
